<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Order - The Legend Veg Dining</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="navbar">
  <div class="logo">The Legend Veg Dining</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="menu.html">Order (<span id="cartCount">0</span>)</a>
    <a href="reservation.html">Reservation</a>
  </nav>
</header>

<section class="section">
  <h2>Our Pan-Asian Menu</h2>
</section>

<div class="menu-grid">

<div class="card">
<h3>Veg Sushi Platter</h3>
<p>₹320</p>
<button class="btn" onclick="addToCart('Veg Sushi Platter',320)">Add</button>
</div>

<div class="card">
<h3>Korean Bibimbap</h3>
<p>₹280</p>
<button class="btn" onclick="addToCart('Korean Bibimbap',280)">Add</button>
</div>

<div class="card">
<h3>Thai Green Curry</h3>
<p>₹300</p>
<button class="btn" onclick="addToCart('Thai Green Curry',300)">Add</button>
</div>

<div class="card">
<h3>Veg Ramen Bowl</h3>
<p>₹250</p>
<button class="btn" onclick="addToCart('Veg Ramen Bowl',250)">Add</button>
</div>

</div>

<div class="cart-box">
<h3>Your Cart</h3>
<div id="cartItems"></div>
<h4>Total: ₹<span id="total">0</span></h4>
<button class="btn" onclick="placeOrder()">Checkout</button>
</div>

<footer class="footer">
© 2026 The Legend Veg Dining
</footer>

<script src="js/script.js"></script>
</body>
</html>
