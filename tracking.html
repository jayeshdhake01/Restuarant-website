<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Track Order - The Legend Veg Dining</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="navbar">
  <div class="logo">The Legend Veg Dining</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="menu.html">Order</a>
  </nav>
</header>

<section class="section">
  <h2>Track Your Order</h2>
</section>

<div class="tracker">

  <div class="track-step" id="step1">Order Confirmed</div>

</div>

<div class="section">
  <button class="btn" onclick="startTracking()">Start Tracking</button>
</div>

<script src="js/script.js"></script>
</body>
</html>
